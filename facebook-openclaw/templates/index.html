<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facebook OpenClaw 管理系统</title>
<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#1c1e21}
.header{background:#1877f2;color:#fff;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.header h1{font-size:18px;font-weight:700;letter-spacing:.5px}
.header-right{display:flex;gap:10px;align-items:center;font-size:13px}
.btn{padding:7px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.btn:disabled{opacity:.55;cursor:not-allowed}
.btn-primary{background:#1877f2;color:#fff}.btn-primary:hover:not(:disabled){background:#166fe5}
.btn-green{background:#42b72a;color:#fff}.btn-green:hover:not(:disabled){background:#36a420}
.btn-red{background:#fa3e3e;color:#fff}.btn-red:hover:not(:disabled){background:#e02020}
.btn-ghost{background:rgba(255,255,255,.2);color:#fff}.btn-ghost:hover{background:rgba(255,255,255,.3)}
.btn-outline{background:#fff;color:#1877f2;border:1px solid #1877f2}.btn-outline:hover{background:#e7f3ff}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-warn{background:#f7b928;color:#fff}.btn-warn:hover{background:#e5a820}

.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1877f2,#42b72a)}
.login-card{background:#fff;border-radius:12px;padding:40px;width:380px;max-width:92%;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.login-card h2{text-align:center;color:#1877f2;margin-bottom:6px;font-size:22px}
.login-card p{text-align:center;color:#65676b;font-size:13px;margin-bottom:24px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:500;margin-bottom:5px}
.form-group input,.form-group select{width:100%;padding:10px 12px;border:1px solid #dddfe2;border-radius:7px;font-size:14px;outline:none}
.form-group input:focus,.form-group select:focus{border-color:#1877f2;box-shadow:0 0 0 2px rgba(24,119,242,.15)}
.err-msg{color:#fa3e3e;font-size:12px;text-align:center;margin-top:8px}

.container{max-width:1360px;margin:0 auto;padding:18px}
.tabs{display:flex;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.1);margin-bottom:18px;flex-wrap:wrap}
.tab{padding:11px 22px;cursor:pointer;font-size:14px;font-weight:500;color:#65676b;border-bottom:3px solid transparent;transition:all .15s;flex:1;text-align:center}
.tab:hover{background:#f0f2f5}
.tab.active{color:#1877f2;border-bottom-color:#1877f2;background:#f0f7ff}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:18px}
.stat-card{background:#fff;border-radius:8px;padding:18px 16px;box-shadow:0 1px 2px rgba(0,0,0,.1);text-align:center}
.stat-num{font-size:30px;font-weight:700;color:#1877f2}
.stat-num.green{color:#42b72a}.stat-num.red{color:#fa3e3e}.stat-num.orange{color:#f7b928}
.stat-label{font-size:12px;color:#65676b;margin-top:4px}

.card{background:#fff;border-radius:8px;padding:18px;box-shadow:0 1px 2px rgba(0,0,0,.1);margin-bottom:14px}
.card-title{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.monitor-ctrl{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.status-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:5px}
.status-dot.on{background:#42b72a;animation:pulse 1.4s infinite}
.status-dot.off{background:#ccc}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.filters{background:#fff;border-radius:8px;padding:10px 16px;margin-bottom:12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;box-shadow:0 1px 2px rgba(0,0,0,.1)}
.filter-input,.filter-select{padding:7px 10px;border:1px solid #dddfe2;border-radius:6px;font-size:13px;outline:none}
.filter-input:focus,.filter-select:focus{border-color:#1877f2}
.filter-input{flex:1;min-width:180px}

table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f0f2f5;padding:10px 12px;text-align:left;font-weight:600;color:#65676b;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid #f0f2f5;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}

.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.badge-green{background:#e7f9e1;color:#1e7a10}
.badge-red{background:#ffeaea;color:#c00}
.badge-blue{background:#e7f3ff;color:#1877f2}
.badge-gray{background:#f0f2f5;color:#65676b}
.badge-orange{background:#fff3e0;color:#e65c00}

.post-text{max-height:60px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;font-size:13px;line-height:1.5;color:#333}
.pagination{display:flex;gap:6px;justify-content:center;margin-top:16px;align-items:center}
.page-btn{padding:5px 11px;border:1px solid #dddfe2;border-radius:5px;cursor:pointer;font-size:13px;background:#fff}
.page-btn:hover{background:#f0f2f5}
.page-btn.active{background:#1877f2;color:#fff;border-color:#1877f2}
.page-info{font-size:13px;color:#65676b}

.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:10px;padding:28px;width:440px;max-width:94%;box-shadow:0 8px 40px rgba(0,0,0,.25)}
.modal h3{font-size:16px;font-weight:700;margin-bottom:18px}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}

.empty{text-align:center;padding:40px;color:#65676b;font-size:14px}
.text-muted{color:#65676b;font-size:12px}
.actions{display:flex;gap:6px;flex-wrap:wrap}
.tag-monitor{background:#e7f3ff;color:#1877f2;padding:1px 6px;border-radius:4px;font-size:11px}
.tag-sender{background:#e7f9e1;color:#1e7a10;padding:1px 6px;border-radius:4px;font-size:11px}
</style>
</head>
<body>
<div id="app">
  <!-- 登录 -->
  <div v-if="!user" class="login-wrap">
    <div class="login-card">
      <h2>OpenClaw 管理系统</h2>
      <p>Facebook 监控 & 发送平台</p>
      <div class="form-group"><label>用户名</label><input v-model="loginForm.username" @keyup.enter="doLogin" placeholder="admin"/></div>
      <div class="form-group"><label>密码</label><input v-model="loginForm.password" @keyup.enter="doLogin" type="password" placeholder="••••••"/></div>
      <button class="btn btn-primary" style="width:100%;padding:11px;font-size:15px;margin-top:4px" @click="doLogin" :disabled="loginLoading">{{ loginLoading ? '登录中...' : '登录' }}</button>
      <div class="err-msg" v-if="loginErr">{{ loginErr }}</div>
    </div>
  </div>

  <!-- 主界面 -->
  <template v-else>
    <div class="header">
      <h1>📊 OpenClaw 管理系统</h1>
      <div class="header-right">
        <span>{{ user.username }} ({{ user.role }})</span>
        <button class="btn btn-ghost btn-sm" @click="openPwdModal">修改密码</button>
        <button class="btn btn-ghost btn-sm" @click="doLogout">退出</button>
      </div>
    </div>

    <div class="container">
      <!-- 标签导航 -->
      <div class="tabs">
        <div class="tab" :class="{active:tab==='dashboard'}" @click="tab='dashboard'">📈 总览</div>
        <div class="tab" :class="{active:tab==='accounts'}" @click="tab='accounts';loadAccounts()">🖥 账号</div>
        <div class="tab" :class="{active:tab==='posts'}" @click="tab='posts';loadPosts()">📄 帖子</div>
        <div class="tab" :class="{active:tab==='tasks'}" @click="tab='tasks';loadTasks()">📋 任务</div>
        <div class="tab" :class="{active:tab==='users'}" @click="tab='users';loadUsers()" v-if="user.role==='admin'">👥 用户</div>
      </div>

      <!-- 总览 -->
      <div v-if="tab==='dashboard'">
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-num">{{ stats.total_posts }}</div><div class="stat-label">抓取帖子</div></div>
          <div class="stat-card"><div class="stat-num green">{{ stats.target_posts }}</div><div class="stat-label">目标帖子</div></div>
          <div class="stat-card"><div class="stat-num blue" style="color:#9b59b6">{{ stats.wa_collected }}</div><div class="stat-label">获取WA号</div></div>
          <div class="stat-card"><div class="stat-num green">{{ stats.wa_messaged }}</div><div class="stat-label">已发WA消息</div></div>
          <div class="stat-card"><div class="stat-num orange">{{ stats.tasks_pending }}</div><div class="stat-label">待执行任务</div></div>
          <div class="stat-card"><div class="stat-num green">{{ stats.tasks_done }}</div><div class="stat-label">已完成任务</div></div>
          <div class="stat-card"><div class="stat-num red">{{ stats.tasks_failed }}</div><div class="stat-label">失败任务</div></div>
        </div>

        <!-- 监控控制 -->
        <div class="card">
          <div class="card-title">
            <span class="status-dot" :class="monitorStatus.scanner_running ? 'on' : 'off'"></span>
            监控 & 发送控制
          </div>
          <div class="monitor-ctrl">
            <span style="font-size:13px;color:#65676b">
              监控线程: {{ Object.keys(monitorStatus.monitor_threads||{}).length }} &nbsp;|&nbsp;
              发送线程: {{ Object.keys(monitorStatus.sender_threads||{}).length }} &nbsp;|&nbsp;
              扫描器: {{ monitorStatus.scanner_running ? '运行中' : '已停止' }}
            </span>
            <button class="btn btn-green" @click="startMonitor" :disabled="actionLoading">▶ 启动全部</button>
            <button class="btn btn-red" @click="stopMonitor" :disabled="actionLoading">■ 停止全部</button>
            <button class="btn btn-outline btn-sm" @click="loadMonitorStatus">刷新状态</button>
          </div>
        </div>

        <!-- OpenClaw Gateway -->
        <div class="card">
          <div class="card-title">🤖 OpenClaw Gateway 状态</div>
          <div v-if="ocStatus.length===0" class="empty">暂无 OpenClaw 实例</div>
          <table v-else>
            <thead><tr><th>账号</th><th>状态</th><th>操作</th></tr></thead>
            <tbody>
              <tr v-for="inst in ocStatus" :key="inst.account_id">
                <td>{{ inst.account_name || inst.account_id }}</td>
                <td><span class="badge" :class="inst.status==='connected'?'badge-green':inst.status==='error'?'badge-red':'badge-gray'">{{ inst.status }}</span></td>
                <td class="actions">
                  <button class="btn btn-green btn-sm" @click="ocStart(inst.account_id)">启动</button>
                  <button class="btn btn-red btn-sm" @click="ocStop(inst.account_id)">停止</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- 账号管理 -->
      <div v-if="tab==='accounts'">
        <div class="card">
          <div class="card-title" style="justify-content:space-between">
            <span>账号列表</span>
            <button class="btn btn-primary btn-sm" @click="openAccModal()">+ 添加账号</button>
          </div>
          <div v-if="accounts.length===0" class="empty">暂无账号，请添加</div>
          <table v-else>
            <thead><tr><th>名称</th><th>类型</th><th>状态</th><th>Cookie URL</th><th>创建时间</th><th>操作</th></tr></thead>
            <tbody>
              <tr v-for="a in accounts" :key="a.id">
                <td>{{ a.name }}</td>
                <td><span :class="a.account_type==='monitor'?'tag-monitor':'tag-sender'">{{ a.account_type==='monitor'?'监控':'发送' }}</span></td>
                <td><span class="badge" :class="a.enabled?'badge-green':'badge-gray'">{{ a.enabled?'启用':'停用' }}</span></td>
                <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"><a :href="a.cookie_url" target="_blank" style="color:#1877f2;font-size:12px">{{ a.cookie_url }}</a></td>
                <td class="text-muted">{{ fmtDate(a.created_at) }}</td>
                <td class="actions">
                  <button class="btn btn-outline btn-sm" @click="openAccModal(a)">编辑</button>
                  <button class="btn btn-warn btn-sm" @click="toggleAccount(a)">{{ a.enabled?'停用':'启用' }}</button>
                  <button class="btn btn-red btn-sm" @click="deleteAccount(a.id)" v-if="user.role==='admin'">删除</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- 帖子 -->
      <div v-if="tab==='posts'">
        <div class="filters">
          <input class="filter-input" v-model="postQ.q" placeholder="搜索帖子内容..." @keyup.enter="loadPosts"/>
          <select class="filter-select" v-model="postQ.is_target" @change="loadPosts">
            <option value="">全部帖子</option>
            <option value="1">目标帖子</option>
            <option value="0">非目标帖子</option>
          </select>
          <select class="filter-select" v-model="postQ.has_wa" @change="loadPosts">
            <option value="">全部</option>
            <option value="1">有WA号</option>
          </select>
          <button class="btn btn-primary btn-sm" @click="loadPosts">搜索</button>
        </div>
        <div class="card">
          <div v-if="posts.length===0" class="empty">暂无帖子数据</div>
          <table v-else>
            <thead><tr><th>ID</th><th>内容</th><th>WA号</th><th>AI结果</th><th>操作</th></tr></thead>
            <tbody>
              <tr v-for="p in posts" :key="p.id">
                <td style="white-space:nowrap">#{{ p.id }}</td>
                <td style="max-width:380px">
                  <div class="post-text">{{ p.content }}</div>
                  <div class="text-muted" style="margin-top:2px">{{ fmtDate(p.created_at) }}</div>
                </td>
                <td>{{ p.customer_wa || '—' }}</td>
                <td>
                  <span v-if="p.is_target===true" class="badge badge-green">目标</span>
                  <span v-else-if="p.is_target===false" class="badge badge-gray">非目标</span>
                  <span v-else class="badge badge-orange">待分析</span>
                </td>
                <td><button class="btn btn-outline btn-sm" @click="openPostDetail(p.id)">详情</button></td>
              </tr>
            </tbody>
          </table>
          <div class="pagination" v-if="postPages>1">
            <button class="page-btn" @click="postPage>1&&(postPage--,loadPosts())" :disabled="postPage<=1">‹</button>
            <span class="page-info">{{ postPage }} / {{ postPages }}</span>
            <button class="page-btn" @click="postPage<postPages&&(postPage++,loadPosts())" :disabled="postPage>=postPages">›</button>
          </div>
        </div>
      </div>

      <!-- 任务 -->
      <div v-if="tab==='tasks'">
        <div class="filters">
          <select class="filter-select" v-model="taskQ.status" @change="loadTasks">
            <option value="">全部状态</option>
            <option value="pending">待执行</option>
            <option value="running">执行中</option>
            <option value="completed">已完成</option>
            <option value="failed">失败</option>
          </select>
          <select class="filter-select" v-model="taskQ.type" @change="loadTasks">
            <option value="">全部类型</option>
            <option value="comment">评论</option>
            <option value="dm">私信</option>
            <option value="whatsapp">WhatsApp</option>
          </select>
          <button class="btn btn-outline btn-sm" @click="loadTasks">刷新</button>
        </div>
        <div class="card">
          <div v-if="tasks.length===0" class="empty">暂无任务数据</div>
          <table v-else>
            <thead><tr><th>ID</th><th>类型</th><th>状态</th><th>帖子ID</th><th>重试</th><th>创建时间</th></tr></thead>
            <tbody>
              <tr v-for="t in tasks" :key="t.id">
                <td>#{{ t.id }}</td>
                <td>{{ t.task_type }}</td>
                <td>
                  <span class="badge" :class="{
                    'badge-orange':t.status==='pending',
                    'badge-blue':t.status==='running',
                    'badge-green':t.status==='completed',
                    'badge-red':t.status==='failed'
                  }">{{ t.status }}</span>
                </td>
                <td>{{ t.post_id }}</td>
                <td>{{ t.retry_count }}</td>
                <td class="text-muted">{{ fmtDate(t.created_at) }}</td>
              </tr>
            </tbody>
          </table>
          <div class="pagination" v-if="taskPages>1">
            <button class="page-btn" @click="taskPage>1&&(taskPage--,loadTasks())" :disabled="taskPage<=1">‹</button>
            <span class="page-info">{{ taskPage }} / {{ taskPages }}</span>
            <button class="page-btn" @click="taskPage<taskPages&&(taskPage++,loadTasks())" :disabled="taskPage>=taskPages">›</button>
          </div>
        </div>
      </div>

      <!-- 用户管理 -->
      <div v-if="tab==='users'&&user.role==='admin'">
        <div class="card">
          <div class="card-title" style="justify-content:space-between">
            <span>用户列表</span>
            <button class="btn btn-primary btn-sm" @click="openUserModal()">+ 添加用户</button>
          </div>
          <div v-if="users.length===0" class="empty">暂无用户</div>
          <table v-else>
            <thead><tr><th>ID</th><th>用户名</th><th>角色</th><th>状态</th><th>创建时间</th><th>操作</th></tr></thead>
            <tbody>
              <tr v-for="u in users" :key="u.id">
                <td>#{{ u.id }}</td>
                <td>{{ u.username }}</td>
                <td><span class="badge" :class="u.role==='admin'?'badge-red':u.role==='manager'?'badge-blue':'badge-gray'">{{ u.role }}</span></td>
                <td><span class="badge" :class="u.enabled?'badge-green':'badge-gray'">{{ u.enabled?'启用':'停用' }}</span></td>
                <td class="text-muted">{{ fmtDate(u.created_at) }}</td>
                <td class="actions">
                  <button class="btn btn-outline btn-sm" @click="openUserModal(u)">编辑</button>
                  <button class="btn btn-red btn-sm" @click="deleteUser(u.id)" v-if="u.id!==user.id">删除</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 修改密码 Modal -->
    <div class="modal-backdrop" v-if="showPwdModal" @click.self="showPwdModal=false">
      <div class="modal">
        <h3>修改密码</h3>
        <div class="form-group"><label>旧密码</label><input type="password" v-model="pwdForm.old_password"/></div>
        <div class="form-group"><label>新密码</label><input type="password" v-model="pwdForm.new_password"/></div>
        <div class="err-msg" v-if="pwdErr">{{ pwdErr }}</div>
        <div class="modal-footer">
          <button class="btn btn-outline" @click="showPwdModal=false">取消</button>
          <button class="btn btn-primary" @click="changePwd">确认修改</button>
        </div>
      </div>
    </div>

    <!-- 账号 Modal -->
    <div class="modal-backdrop" v-if="showAccModal" @click.self="showAccModal=false">
      <div class="modal">
        <h3>{{ accForm.id ? '编辑账号' : '添加账号' }}</h3>
        <div class="form-group"><label>名称</label><input v-model="accForm.name" placeholder="账号标识名"/></div>
        <div class="form-group" v-if="!accForm.id">
          <label>类型</label>
          <select v-model="accForm.account_type">
            <option value="monitor">监控账号</option>
            <option value="sender">发送账号</option>
          </select>
        </div>
        <div class="form-group"><label>Cookie URL</label><input v-model="accForm.cookie_url" placeholder="https://..."/></div>
        <div class="err-msg" v-if="accErr">{{ accErr }}</div>
        <div class="modal-footer">
          <button class="btn btn-outline" @click="showAccModal=false">取消</button>
          <button class="btn btn-primary" @click="saveAccount">保存</button>
        </div>
      </div>
    </div>

    <!-- 用户 Modal -->
    <div class="modal-backdrop" v-if="showUserModal" @click.self="showUserModal=false">
      <div class="modal">
        <h3>{{ userForm.id ? '编辑用户' : '添加用户' }}</h3>
        <div class="form-group"><label>用户名</label><input v-model="userForm.username" :disabled="!!userForm.id"/></div>
        <div class="form-group">
          <label>角色</label>
          <select v-model="userForm.role">
            <option value="admin">管理员</option>
            <option value="manager">运营主管</option>
            <option value="employee">运营员工</option>
          </select>
        </div>
        <div class="form-group"><label>密码{{ userForm.id ? '（留空不修改）' : '' }}</label><input type="password" v-model="userForm.password"/></div>
        <div class="form-group" v-if="userForm.id">
          <label>状态</label>
          <select v-model="userForm.enabled">
            <option :value="true">启用</option>
            <option :value="false">停用</option>
          </select>
        </div>
        <div class="err-msg" v-if="userErr">{{ userErr }}</div>
        <div class="modal-footer">
          <button class="btn btn-outline" @click="showUserModal=false">取消</button>
          <button class="btn btn-primary" @click="saveUser">保存</button>
        </div>
      </div>
    </div>

    <!-- 帖子详情 Modal -->
    <div class="modal-backdrop" v-if="showPostModal" @click.self="showPostModal=false">
      <div class="modal" style="width:580px;max-height:85vh;overflow-y:auto">
        <h3>帖子详情 #{{ postDetail?.id }}</h3>
        <div v-if="postDetail">
          <div style="margin-bottom:12px;font-size:13px;line-height:1.6;background:#f0f2f5;padding:12px;border-radius:6px">{{ postDetail.content }}</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px;margin-bottom:16px">
            <div><b>AI结果：</b><span class="badge" :class="postDetail.is_target?'badge-green':'badge-gray'">{{ postDetail.is_target===true?'目标':postDetail.is_target===false?'非目标':'待分析' }}</span></div>
            <div><b>WA号：</b>{{ postDetail.customer_wa || '—' }}</div>
            <div><b>来源：</b>{{ postDetail.wa_source || '—' }}</div>
            <div><b>已发WA：</b>{{ postDetail.wa_messaged ? '是' : '否' }}</div>
          </div>
          <div style="font-size:13px;font-weight:600;margin-bottom:8px">手动录入 WA 号</div>
          <div class="form-group"><input v-model="fbForm.whatsapp_number" placeholder="如：+8613800000000"/></div>
          <div class="form-group">
            <select v-model="fbForm.contact_status">
              <option value="">联系状态</option>
              <option value="pending">待联系</option>
              <option value="contacted">已联系</option>
              <option value="replied">已回复</option>
              <option value="converted">已转化</option>
            </select>
          </div>
          <div class="form-group"><input v-model="fbForm.notes" placeholder="备注..."/></div>
          <div v-if="postDetail.tasks&&postDetail.tasks.length" style="margin-top:12px">
            <div style="font-size:13px;font-weight:600;margin-bottom:6px">关联任务</div>
            <div v-for="t in postDetail.tasks" :key="t.id" style="font-size:12px;color:#65676b;padding:4px 0">
              #{{ t.id }} {{ t.task_type }} — <span :class="t.status==='completed'?'badge badge-green':t.status==='failed'?'badge badge-red':'badge badge-orange'">{{ t.status }}</span>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline" @click="showPostModal=false">关闭</button>
          <button class="btn btn-primary" @click="submitFeedback">保存反馈</button>
        </div>
      </div>
    </div>
  </template>
</div>

<script>
const { createApp, ref, reactive, onMounted } = Vue;
createApp({
  setup() {
    const user = ref(null);
    const tab = ref('dashboard');
    const loginLoading = ref(false);
    const loginErr = ref('');
    const actionLoading = ref(false);
    const loginForm = reactive({ username: '', password: '' });

    const stats = reactive({ total_posts:0,target_posts:0,wa_collected:0,wa_messaged:0,tasks_pending:0,tasks_done:0,tasks_failed:0 });
    const monitorStatus = reactive({ monitor_threads:{}, sender_threads:{}, scanner_running:false });
    const ocStatus = ref([]);

    const accounts = ref([]);
    const posts = ref([]);
    const postPage = ref(1);
    const postPages = ref(1);
    const postQ = reactive({ q:'', is_target:'', has_wa:'' });

    const tasks = ref([]);
    const taskPage = ref(1);
    const taskPages = ref(1);
    const taskQ = reactive({ status:'', type:'' });

    const users = ref([]);

    const showPwdModal = ref(false);
    const pwdForm = reactive({ old_password:'', new_password:'' });
    const pwdErr = ref('');

    const showAccModal = ref(false);
    const accForm = reactive({ id:null, name:'', account_type:'monitor', cookie_url:'' });
    const accErr = ref('');

    const showUserModal = ref(false);
    const userForm = reactive({ id:null, username:'', role:'employee', password:'', enabled:true });
    const userErr = ref('');

    const showPostModal = ref(false);
    const postDetail = ref(null);
    const fbForm = reactive({ whatsapp_number:'', contact_status:'', notes:'' });

    async function api(url, opts={}) {
      const r = await fetch(url, { headers:{'Content-Type':'application/json'}, credentials:'same-origin', ...opts });
      const data = await r.json().catch(()=>({}));
      if (r.status===401) { user.value=null; }
      return { ok: r.ok, status: r.status, data };
    }

    async function doLogin() {
      loginLoading.value=true; loginErr.value='';
      const { ok, data } = await api('/api/auth/login',{ method:'POST', body:JSON.stringify(loginForm) });
      loginLoading.value=false;
      if (ok) { user.value=data.user; loadDashboard(); }
      else loginErr.value = data.error||'登录失败';
    }

    async function doLogout() {
      await api('/api/auth/logout',{ method:'POST' });
      user.value=null;
    }

    async function loadDashboard() {
      const [s,m,oc] = await Promise.all([
        api('/api/stats'),
        api('/api/monitor/status'),
        api('/api/openclaw/status'),
      ]);
      if(s.ok) Object.assign(stats, s.data);
      if(m.ok) Object.assign(monitorStatus, m.data);
      if(oc.ok) ocStatus.value = oc.data.instances||[];
    }

    async function loadMonitorStatus() {
      const { ok, data } = await api('/api/monitor/status');
      if(ok) Object.assign(monitorStatus, data);
      const { ok:s2, data:d2 } = await api('/api/stats');
      if(s2) Object.assign(stats, d2);
    }

    async function startMonitor() {
      actionLoading.value=true;
      const { ok, data } = await api('/api/monitor/start',{ method:'POST', body:'{}' });
      actionLoading.value=false;
      if(ok) { alert(`已启动：监控账号 ${data.monitor_accounts}，发送账号 ${data.sender_accounts}`); loadMonitorStatus(); }
      else alert(data.error||'启动失败');
    }

    async function stopMonitor() {
      actionLoading.value=true;
      await api('/api/monitor/stop',{ method:'POST', body:'{}' });
      actionLoading.value=false;
      loadMonitorStatus();
    }

    async function ocStart(id) {
      const { ok } = await api(`/api/openclaw/${id}/start`,{ method:'POST', body:'{}' });
      if(ok) loadDashboard(); else alert('启动失败');
    }
    async function ocStop(id) {
      const { ok } = await api(`/api/openclaw/${id}/stop`,{ method:'POST', body:'{}' });
      if(ok) loadDashboard(); else alert('停止失败');
    }

    async function loadAccounts() {
      const { ok, data } = await api('/api/accounts');
      if(ok) accounts.value=data.accounts||[];
    }

    function openAccModal(a=null) {
      accErr.value='';
      if(a) { Object.assign(accForm,{ id:a.id, name:a.name, account_type:a.account_type, cookie_url:a.cookie_url||'' }); }
      else { Object.assign(accForm,{ id:null, name:'', account_type:'monitor', cookie_url:'' }); }
      showAccModal.value=true;
    }

    async function saveAccount() {
      accErr.value='';
      const body = { name:accForm.name, account_type:accForm.account_type, cookie_url:accForm.cookie_url };
      const url = accForm.id ? `/api/accounts/${accForm.id}` : '/api/accounts';
      const method = accForm.id ? 'PUT' : 'POST';
      const { ok, data } = await api(url,{ method, body:JSON.stringify(body) });
      if(ok) { showAccModal.value=false; loadAccounts(); }
      else accErr.value=data.error||'保存失败';
    }

    async function toggleAccount(a) {
      await api(`/api/accounts/${a.id}`,{ method:'PUT', body:JSON.stringify({ enabled:!a.enabled }) });
      loadAccounts();
    }

    async function deleteAccount(id) {
      if(!confirm('确认删除该账号？')) return;
      const { ok, data } = await api(`/api/accounts/${id}`,{ method:'DELETE' });
      if(ok) loadAccounts(); else alert(data.error||'删除失败');
    }

    async function loadPosts() {
      const p = new URLSearchParams({ page:postPage.value, size:20 });
      if(postQ.q) p.set('q',postQ.q);
      if(postQ.is_target!=='') p.set('is_target',postQ.is_target);
      if(postQ.has_wa==='1') p.set('has_wa','1');
      const { ok, data } = await api('/api/posts?'+p);
      if(ok){ posts.value=data.posts||[]; postPages.value=data.pages||1; }
    }

    async function openPostDetail(id) {
      const { ok, data } = await api(`/api/posts/${id}`);
      if(ok){
        postDetail.value=data.post;
        Object.assign(fbForm,{ whatsapp_number:data.post.customer_wa||'', contact_status:'', notes:'' });
        showPostModal.value=true;
      }
    }

    async function submitFeedback() {
      if(!postDetail.value) return;
      const body = {};
      if(fbForm.whatsapp_number) body.whatsapp_number=fbForm.whatsapp_number;
      if(fbForm.contact_status) body.contact_status=fbForm.contact_status;
      if(fbForm.notes) body.notes=fbForm.notes;
      await api(`/api/posts/${postDetail.value.id}/feedback`,{ method:'POST', body:JSON.stringify(body) });
      showPostModal.value=false;
      loadPosts();
    }

    async function loadTasks() {
      const p = new URLSearchParams({ page:taskPage.value, size:20 });
      if(taskQ.status) p.set('status',taskQ.status);
      if(taskQ.type) p.set('type',taskQ.type);
      const { ok, data } = await api('/api/tasks?'+p);
      if(ok){ tasks.value=data.tasks||[]; taskPages.value=Math.ceil((data.total||0)/20)||1; }
    }

    async function loadUsers() {
      const { ok, data } = await api('/api/users');
      if(ok) users.value=data.users||[];
    }

    function openUserModal(u=null) {
      userErr.value='';
      if(u) Object.assign(userForm,{ id:u.id, username:u.username, role:u.role, password:'', enabled:u.enabled });
      else Object.assign(userForm,{ id:null, username:'', role:'employee', password:'', enabled:true });
      showUserModal.value=true;
    }

    async function saveUser() {
      userErr.value='';
      const body = { role:userForm.role };
      if(!userForm.id) { body.username=userForm.username; body.password=userForm.password; }
      if(userForm.password) body.password=userForm.password;
      if(userForm.id) body.enabled=userForm.enabled;
      const url = userForm.id ? `/api/users/${userForm.id}` : '/api/users';
      const method = userForm.id ? 'PUT' : 'POST';
      const { ok, data } = await api(url,{ method, body:JSON.stringify(body) });
      if(ok){ showUserModal.value=false; loadUsers(); }
      else userErr.value=data.error||'保存失败';
    }

    async function deleteUser(id) {
      if(!confirm('确认删除该用户？')) return;
      const { ok, data } = await api(`/api/users/${id}`,{ method:'DELETE' });
      if(ok) loadUsers(); else alert(data.error||'删除失败');
    }

    function openPwdModal() {
      pwdErr.value=''; Object.assign(pwdForm,{ old_password:'', new_password:'' });
      showPwdModal.value=true;
    }

    async function changePwd() {
      pwdErr.value='';
      const { ok, data } = await api('/api/auth/change-password',{ method:'POST', body:JSON.stringify(pwdForm) });
      if(ok){ showPwdModal.value=false; alert('密码已修改'); }
      else pwdErr.value=data.error||'修改失败';
    }

    function fmtDate(s) {
      if(!s) return '—';
      return new Date(s).toLocaleString('zh-CN',{ month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit' });
    }

    onMounted(async () => {
      const { ok, data } = await api('/api/auth/me');
      if(ok){ user.value=data.user; loadDashboard(); }
    });

    return {
      user, tab, loginLoading, loginErr, loginForm, actionLoading,
      stats, monitorStatus, ocStatus,
      accounts, posts, postPage, postPages, postQ,
      tasks, taskPage, taskPages, taskQ,
      users,
      showPwdModal, pwdForm, pwdErr,
      showAccModal, accForm, accErr,
      showUserModal, userForm, userErr,
      showPostModal, postDetail, fbForm,
      doLogin, doLogout,
      loadMonitorStatus, startMonitor, stopMonitor, ocStart, ocStop,
      loadAccounts, openAccModal, saveAccount, toggleAccount, deleteAccount,
      loadPosts, openPostDetail, submitFeedback,
      loadTasks,
      loadUsers, openUserModal, saveUser, deleteUser,
      openPwdModal, changePwd,
      fmtDate,
    };
  }
}).mount('#app');
</script>
</body>
</html>
